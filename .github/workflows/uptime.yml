name: Uptime CI

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  uptime:
    runs-on: ubuntu-latest
    steps:
      - uses: upptime/uptime-monitor@master
        env:
          GH_PAT: ${{ secrets.GITHUB_TOKEN }}
